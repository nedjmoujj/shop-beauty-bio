<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Beauty View</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo', sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b,#0ea5e9);
color:white;
scroll-behavior:smooth;
}

/* ================= TOP ================= */
.top{
background:linear-gradient(90deg,#ff0080,#8b5cf6,#00c3ff);
text-align:center;
padding:18px;
font-size:18px;
font-weight:bold;
}

/* ================= HEADER ================= */
.header{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-top:20px;
}

.logo{
width:85px;
height:85px;
border-radius:50%;
overflow:hidden;
border:3px solid white;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

.title{
font-size:36px;
background:linear-gradient(90deg,#fff,#00c3ff,#ff0080);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* ================= TRUST ================= */
.trust{
margin-top:15px;
text-align:center;
padding:12px;
background:rgba(255,255,255,0.1);
}

/* ================= HERO (APPLE STYLE) ================= */
.hero{
display:flex;
justify-content:space-between;
align-items:center;
padding:60px;
gap:30px;
overflow:hidden;
position:relative;
}

.hero img,
.hero-text{
animation:premiumReveal 6s cubic-bezier(0.25, 1, 0.5, 1) infinite;
will-change:transform,opacity;
}

.hero img{
width:420px;
}

.hero-text h1{
font-size:52px;
background:linear-gradient(90deg,#fff,#00c3ff,#ff0080);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.rating{
margin-top:8px;
font-size:18px;
color:#ffd700;
}

.free{
margin-top:10px;
background:#22c55e;
padding:6px 15px;
border-radius:20px;
display:inline-block;
}

.btn{
margin-top:20px;
padding:15px 25px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#ff0080,#00c3ff);
color:white;
cursor:pointer;
transition:0.2s;
}

.btn:active{
transform:scale(0.97);
}

/* ================= PRODUCTS ================= */
.products{
display:flex;
justify-content:center;
gap:20px;
padding:50px;
flex-wrap:wrap;
}

.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:20px;
width:260px;
}

.card img{
width:100%;
border-radius:15px;
}

.price{
font-size:22px;
font-weight:bold;
}

.tag{
background:gold;
color:black;
padding:3px 10px;
border-radius:20px;
font-size:12px;
}

/* ================= RESULTS ================= */
.results{
text-align:center;
padding:50px;
}

.results img{
width:200px;
border-radius:15px;
margin-top:10px;
}

/* ================= POPUP ================= */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.form{
background:white;
color:black;
padding:20px;
width:300px;
border-radius:15px;
position:relative;
}

.close{
position:absolute;
top:10px;
right:15px;
font-size:22px;
cursor:pointer;
font-weight:bold;
}

input{
width:100%;
margin:10px 0;
padding:10px;
border-radius:10px;
}

/* ================= FAKE ORDERS ================= */
.fake-order{
position:fixed;
bottom:20px;
left:20px;
background:white;
color:black;
padding:12px 16px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
font-size:14px;
opacity:0;
transform:translateY(20px);
transition:0.5s;
z-index:9999;
}

.fake-order.show{
opacity:1;
transform:translateY(0);
}

/* ================= ANIMATION ================= */
@keyframes premiumReveal{
0%{transform:translateX(-80px) scale(0.98);opacity:0;}
20%{transform:translateX(0) scale(1);opacity:1;}
60%{transform:translateX(6px) scale(1.01);opacity:1;}
100%{transform:translateX(-80px) scale(0.98);opacity:0;}
}

/* ================= MOBILE FIX ================= */
@media (max-width: 768px){
.hero{
flex-direction:column;
text-align:center;
padding:30px 20px;
gap:20px;
}

.hero img{
width:85%;
max-width:320px;
}

.hero-text h1{
font-size:34px;
line-height:1.3;
}
}

</style>
</head>

<body>

<div class="top">🚚 توصيل مجاني + الدفع عند الاستلام</div>

<div class="header">
<div class="logo"><img src="Bio.jpg"></div>
<div class="title">Shop BeautyBio</div>
</div>

<div class="trust">
⭐ تقييم 4.9 ★★★★★ | 💯 جودة مضمونة | 🚚 توصيل سريع
</div>

<!-- HERO -->
<div class="hero">

<img src="pro2.png">

<div class="hero-text">
<h1>الثقة<br>الجودة<br>السعر</h1>

<p>زيت طبيعي لتطويل الرموش والحواجب</p>

<div class="rating">★★★★★</div>

<div class="free">🚚 توصيل مجاني</div>

<button class="btn" onclick="document.getElementById('products').scrollIntoView()">اشتري الآن</button>

</div>

</div>

<!-- PRODUCTS -->
<div class="products" id="products">

<div class="card">
<div class="tag">بيع +32</div>
<img src="bio2v.jpg">
<h3>زيت واحد</h3>
<p class="price">2900 دج</p>
<button class="btn" onclick="openForm('زيت واحد')">شراء</button>
</div>

<div class="card">
<div class="tag">🔥 الأكثر طلباً</div>
<img src="bio2v.jpg">
<h3>عرض زوج زيوت</h3>
<p class="price">5400 دج</p>
<button class="btn" onclick="openForm('عرض زوج زيوت')">شراء</button>
</div>

</div>

<!-- RESULTS (IMAGE BACK) -->
<div class="results">
<h2>نتائج المنتوج 📸</h2>
<p style="color:#22c55e;">نتائج خلال 3 أسابيع 🔥</p>
<img src="Biob.jpg">
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="form">
<span class="close" onclick="closeForm()">✖</span>

<h3>إكمال الطلب</h3>

<input placeholder="الاسم">
<input placeholder="الرقم">
<input placeholder="الولاية">

<button class="btn" onclick="sendWhatsApp()">طلب</button>

</div>
</div>

<!-- FAKE ORDERS -->
<div class="fake-order" id="fakeOrder"></div>

<script>

let selectedProduct = "";

function openForm(product){
selectedProduct = product;
document.getElementById("popup").style.display="flex";
}

function closeForm(){
document.getElementById("popup").style.display="none";
}

function sendWhatsApp(){

let name = document.querySelectorAll("input")[0].value;
let phone = document.querySelectorAll("input")[1].value;
let wilaya = document.querySelectorAll("input")[2].value;

let message =
"🛍️ طلب جديد:%0A" +
"📦 المنتج: " + selectedProduct + "%0A" +
"👤 الاسم: " + name + "%0A" +
"📞 الرقم: " + phone + "%0A" +
"📍 الولاية: " + wilaya;

window.location.href =
"https://wa.me/213749440945?text=" + encodeURIComponent(message);
}

/* fake orders */
const names = ["ياسمين","أمينة","سارة","خديجة","نورة","فاطمة","ليلى","إيمان","مريم","رحمة"];

function showFakeOrder(){
let name = names[Math.floor(Math.random()*names.length)];
let box = document.getElementById("fakeOrder");

box.innerText = name + " اشترت الآن 🔥";
box.classList.add("show");

setTimeout(()=>{
box.classList.remove("show");
},3000);
}

setInterval(showFakeOrder, 6000);

</script>

</body>
</html>
